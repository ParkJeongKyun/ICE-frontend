name: "🐛 Bug Report (버그 제보)"
description: "ICE-Forensic 사용 중 발견된 문제를 알려주세요."
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛡️ 제보해주셔서 감사합니다!
        여러분의 제보가 **ICE-Forensic**을 더 정교한 도구로 만듭니다.
        
  - type: checkboxes
    id: pr-check
    attributes:
      label: "사전 확인 사항"
      description: "제보 전 아래 사항을 확인해 주세요."
      options:
        - label: "이미 동일한 내용의 이슈가 등록되어 있는지 확인했습니다."
          required: true
        - label: "최신 버전의 ICE-Forensic을 사용 중입니다."
          required: true

  - type: dropdown
    id: environment
    attributes:
      label: "분석 환경 (Environment)"
      description: "문제가 발생한 운영체제나 브라우저를 선택해 주세요."
      multiple: false
      options:
        - "Windows 10/11"
        - "macOS (Apple Silicon)"
        - "macOS (Intel)"
        - "Linux (Ubuntu/Debian)"
        - "Web Browser (Chrome/Edge)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: "버그 상세 설명"
      description: "어떤 문제가 발생했는지 자세히 적어주세요."
      placeholder: "예: 특정 이미지 파일을 로드할 때 분석 엔진이 멈춥니다."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "재현 방법 (Steps to Reproduce)"
      description: "문제를 다시 발생시키기 위한 순서를 적어주세요."
      placeholder: |
        1. ICE-Forensic 실행
        2. [파일 열기] 클릭 후 특정 .raw 파일 선택
        3. 분석 버튼 클릭 시 에러 발생
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: "스크린샷 또는 로그 (선택)"
      description: "에러 화면이나 콘솔 로그가 있다면 여기에 드래그 앤 드롭해 주세요."
      placeholder: "이미지나 텍스트를 첨부해 주시면 해결이 더 빠릅니다."

  - type: checkboxes
    id: anonymous-contact
    attributes:
      label: "추가 연락처 제공 (선택)"
      options:
        - label: "해결을 위해 이메일 등으로 연락받을 의사가 있습니다."
