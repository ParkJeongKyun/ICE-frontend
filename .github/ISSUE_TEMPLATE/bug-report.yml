name: "🐛 Bug Report (버그 제보)"
description: "Report a problem you found in ICE-Forensic (발견된 문제를 알려주세요)"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛡️ Thank you for your report! (제보해주셔서 감사합니다!)
        Your report makes **ICE-Forensic** a more precise tool.
        여러분의 제보가 ICE-Forensic을 더 정교한 도구로 만듭니다.
        
  - type: dropdown
    id: primary-environment
    attributes:
      label: "Primary Environment (주요 발생 환경)"
      description: "Select the main environment where the issue was found (문제가 발견된 주된 환경을 선택해 주세요)"
      options:
        - "Windows 10/11 (64-bit)"
        - "macOS (Apple Silicon - M1/M2/M3)"
        - "macOS (Intel Core)"
        - "Linux (Ubuntu/Debian/Kali)"
        - "Web Browser (Chrome/Edge/Arc)"
        - "Other / Not Listed"
    validations:
      required: true

  - type: checkboxes
    id: affected-environments
    attributes:
      label: "Also occurs in... (다른 발생 환경 - 선택)"
      description: "Check if the issue occurs in multiple environments (여러 환경에서 공통적으로 발생한다면 체크해 주세요)"
      options:
        - label: "Confirmed on Windows (윈도우 확인됨)"
        - label: "Confirmed on macOS (맥 확인됨)"
        - label: "Confirmed on Linux (리눅스 확인됨)"
        - label: "Confirmed on Web Browser (웹 브라우저 확인됨)"
        - label: "Occurs on ALL environments (모든 환경에서 발생함)"

  - type: input
    id: version-detail
    attributes:
      label: "Specific Version Detail (상세 버전 정보)"
      description: "e.g. Windows 11 23H2, Chrome v122 (구체적인 버전을 적어주세요)"

  - type: textarea
    id: bug-description
    attributes:
      label: "Detailed Description (버그 상세 설명)"
      description: "Please describe the problem in detail (문제를 자세히 적어주세요)"
      placeholder: "e.g. Analysis engine freezes when loading specific image files. (예: 특정 이미지 로드시 엔진 멈춤)"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce (재현 방법)"
      description: "Steps to make the problem happen again (문제를 다시 발생시키기 위한 순서)"
      placeholder: |
        1. Run ICE-Forensic (실행)
        2. Click [Open File] and select a .raw file (파일 선택)
        3. Error occurs when clicking the analyze button (분석 버튼 클릭 시 에러 발생)
    validations:
      required: true

  - type: checkboxes
    id: contact-consent
    attributes:
      label: "Contact Consent (추가 연락처 제공 - 선택)"
      options:
        - label: "I am willing to be contacted via email for resolution. (해결을 위해 연락받을 의사가 있습니다.)"

  - type: markdown
    attributes:
      value: |
        ---
        🌐 **Official Website:** [ice-forensic.com](https://ice-forensic.com)
        *Check out more tools and documentation on our official site.*
        *공식 사이트에서 더 많은 도구와 문서를 확인하세요.*
