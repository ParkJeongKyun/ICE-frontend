name: "🐛 Bug Report (버그 제보)"
description: "Report a problem you found in ICE-Forensic (발견된 문제를 알려주세요)"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛡️ Thank you for your report! (제보해주셔서 감사합니다!)
        Your report makes **ICE-Forensic** a more precise tool.
        여러분의 제보가 ICE-Forensic을 더 정교한 도구로 만듭니다.
        
  - type: checkboxes
    id: pr-check
    attributes:
      label: "Before reporting (사전 확인 사항)"
      description: "Please check the following before submitting (제보 전 아래 사항을 확인해 주세요)"
      options:
        - label: "I have checked if a similar issue already exists. (이미 동일한 이슈가 있는지 확인했습니다.)"
          required: true
        - label: "I am using the latest version of ICE-Forensic. (최신 버전을 사용 중입니다.)"
          required: true

  - type: dropdown
    id: environment
    attributes:
      label: "Environment (분석 환경)"
      description: "Select the OS or browser where the problem occurred (운영체제나 브라우저를 선택해 주세요)"
      multiple: false
      options:
        - "Windows 10/11"
        - "macOS (Apple Silicon)"
        - "macOS (Intel)"
        - "Linux (Ubuntu/Debian)"
        - "Web Browser (Chrome/Edge)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: "Detailed Description (버그 상세 설명)"
      description: "Please describe the problem in detail (문제를 자세히 적어주세요)"
      placeholder: "e.g. Analysis engine freezes when loading specific image files. (예: 특정 이미지 로드시 엔진 멈춤)"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce (재현 방법)"
      description: "Steps to make the problem happen again (문제를 다시 발생시키기 위한 순서)"
      placeholder: |
        1. Run ICE-Forensic (실행)
        2. Click [Open File] and select a .raw file (파일 선택)
        3. Error occurs when clicking the analyze button (분석 버튼 클릭 시 에러 발생)
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: "Screenshots or Logs (스크린샷 또는 로그 - 선택)"
      description: "Drag and drop error screens or console logs here (에러 화면이나 로그를 드래그 앤 드롭 하세요)"
      placeholder: "Attaching images or text helps solve problems faster. (이미지 첨부는 빠른 해결에 도움이 됩니다.)"

  - type: checkboxes
    id: contact-consent
    attributes:
      label: "Contact Consent (추가 연락처 제공 - 선택)"
      options:
        - label: "I am willing to be contacted via email for resolution. (해결을 위해 연락받을 의사가 있습니다.)"

  - type: markdown
    attributes:
      value: |
        ---
        🌐 **Official Website:** [ice-forensic.com](https://ice-forensic.com)
        *Check out more tools and documentation on our official site.*
        *공식 사이트에서 더 많은 도구와 문서를 확인하세요.*
